server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/gateway/auth/**
              filters:
                - StripPrefix=1
            - id: delivery-service
              uri: lb://DELIVERY-SERVICE
              predicates:
                - Path=/gateway/deliveries/**
              filters:
                - StripPrefix=1
            - id: tracking-service
              uri: lb://TRACKING-SERVICE
              predicates:
                - Path=/gateway/tracking/**
              filters:
                - StripPrefix=1
            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/gateway/admin/**
              filters:
                - StripPrefix=1
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: localhost
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
